<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="0.55" stop-color="#0d1320"/>
      <stop offset="1" stop-color="#0a0f1c"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f9731a"/>
      <stop offset="0.6" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- hexagon chip geometry (flat-top), fill/stroke inherited from each use -->
    <g id="hx"><polygon points="11,0 5.5,9.5 -5.5,9.5 -11,0 -5.5,-9.5 5.5,-9.5"/></g>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.3">
    <path d="M0 80H1200M0 160H1200M0 240H1200"/>
    <path d="M200 0V320M400 0V320M600 0V320M800 0V320M1000 0V320"/>
  </g>

  <!-- depth layer: dim distant swarm for scale -->
  <g fill="#334155">
    <circle cx="90" cy="50" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="285" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="4.1s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="30" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.8s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="300" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="4.3s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="60" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.6s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="160" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="4.0s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="150" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.9s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="300" r="2"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="4.2s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- hub-to-agent links (dispatch channels) -->
  <g fill="none" stroke="#f97316" stroke-width="1.4" opacity="0.4" stroke-dasharray="5 9">
    <path d="M600 160 L760 90"><animate attributeName="stroke-dashoffset" values="0;28" dur="2.0s" repeatCount="indefinite"/></path>
    <path d="M600 160 L820 220"><animate attributeName="stroke-dashoffset" values="0;28" dur="2.3s" repeatCount="indefinite"/></path>
    <path d="M600 160 L980 180"><animate attributeName="stroke-dashoffset" values="0;28" dur="2.6s" repeatCount="indefinite"/></path>
    <path d="M600 160 L560 60"><animate attributeName="stroke-dashoffset" values="0;28" dur="2.1s" repeatCount="indefinite"/></path>
    <path d="M600 160 L430 150"><animate attributeName="stroke-dashoffset" values="0;28" dur="2.4s" repeatCount="indefinite"/></path>
    <path d="M600 160 L420 260"><animate attributeName="stroke-dashoffset" values="0;28" dur="2.2s" repeatCount="indefinite"/></path>
    <path d="M600 160 L700 250"><animate attributeName="stroke-dashoffset" values="0;28" dur="2.5s" repeatCount="indefinite"/></path>
  </g>

  <!-- secondary agent-to-agent links -->
  <g fill="none" stroke="#22d3ee" stroke-width="1.1" opacity="0.22" stroke-dasharray="4 8">
    <path d="M430 150 L300 60"/>
    <path d="M430 150 L150 90"/>
    <path d="M760 90 L900 70"/>
    <path d="M980 180 L1050 90"/>
    <path d="M820 220 L1080 240"/>
    <path d="M250 230 L120 200"/>
  </g>

  <!-- DISPATCH packets: hub -> agent (orange) -->
  <g fill="#f9a04a">
    <circle r="3"><animateMotion path="M600 160 L760 90" dur="1.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M600 160 L820 220" dur="2.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M600 160 L980 180" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M600 160 L560 60" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M600 160 L430 150" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M600 160 L420 260" dur="2.0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.0s" repeatCount="indefinite"/></circle>
    <circle r="3"><animateMotion path="M600 160 L700 250" dur="2.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- RESULT packets: agent -> hub (cyan), offset so they return after dispatch -->
  <g fill="#22d3ee">
    <circle r="2.7"><animateMotion path="M760 90 L600 160" dur="1.9s" begin="0.95s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="1.9s" begin="0.95s" repeatCount="indefinite"/></circle>
    <circle r="2.7"><animateMotion path="M820 220 L600 160" dur="2.1s" begin="1.05s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.1s" begin="1.05s" repeatCount="indefinite"/></circle>
    <circle r="2.7"><animateMotion path="M980 180 L600 160" dur="2.4s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle r="2.7"><animateMotion path="M560 60 L600 160" dur="1.8s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="1.8s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle r="2.7"><animateMotion path="M430 150 L600 160" dur="2.2s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.2s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle r="2.7"><animateMotion path="M420 260 L600 160" dur="2.0s" begin="1.0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.0s" begin="1.0s" repeatCount="indefinite"/></circle>
    <circle r="2.7"><animateMotion path="M700 250 L600 160" dur="2.3s" begin="1.15s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.3s" begin="1.15s" repeatCount="indefinite"/></circle>
  </g>

  <!-- AGENT CHIPS: hexagons that drift and cycle idle->working->done -->
  <g filter="url(#glow)" stroke-width="1.7" stroke="#64748b" fill="#0d1320">
    <g transform="translate(760,90)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 6 -6; 0 0" keyTimes="0;0.5;1" dur="7.0s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.2s" begin="0.0s" repeatCount="indefinite"/></use>
      <circle r="3" fill="#f97316"><animate attributeName="fill" values="#475569;#f97316;#22d3ee;#475569" dur="4.2s" begin="0.0s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(820,220)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -6 7; 0 0" keyTimes="0;0.5;1" dur="8.2s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.6s" begin="0.6s" repeatCount="indefinite"/></use>
      <circle r="3" fill="#f97316"><animate attributeName="fill" values="#475569;#f97316;#22d3ee;#475569" dur="4.6s" begin="0.6s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(980,180)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 7 -5; 0 0" keyTimes="0;0.5;1" dur="7.6s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.0s" begin="1.2s" repeatCount="indefinite"/></use>
      <circle r="3" fill="#f97316"><animate attributeName="fill" values="#475569;#f97316;#22d3ee;#475569" dur="4.0s" begin="1.2s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(560,60)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -6 6; 0 0" keyTimes="0;0.5;1" dur="8.6s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.4s" begin="0.3s" repeatCount="indefinite"/></use>
      <circle r="3" fill="#f97316"><animate attributeName="fill" values="#475569;#f97316;#22d3ee;#475569" dur="4.4s" begin="0.3s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(430,150)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 7 -5; 0 0" keyTimes="0;0.5;1" dur="7.2s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.2s" begin="0.9s" repeatCount="indefinite"/></use>
      <circle r="3" fill="#f97316"><animate attributeName="fill" values="#475569;#f97316;#22d3ee;#475569" dur="4.2s" begin="0.9s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(420,260)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 6 -7; 0 0" keyTimes="0;0.5;1" dur="8.0s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.8s" begin="1.5s" repeatCount="indefinite"/></use>
      <circle r="3" fill="#f97316"><animate attributeName="fill" values="#475569;#f97316;#22d3ee;#475569" dur="4.8s" begin="1.5s" repeatCount="indefinite"/></circle></g>
    <g transform="translate(700,250)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -7 6; 0 0" keyTimes="0;0.5;1" dur="7.8s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.0s" begin="0.5s" repeatCount="indefinite"/></use>
      <circle r="3" fill="#f97316"><animate attributeName="fill" values="#475569;#f97316;#22d3ee;#475569" dur="4.0s" begin="0.5s" repeatCount="indefinite"/></circle></g>
    <!-- secondary chips (smaller, farther) -->
    <g transform="translate(300,60) scale(0.8)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 6 -6; 0 0" keyTimes="0;0.5;1" dur="9.0s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="5.0s" begin="0.4s" repeatCount="indefinite"/></use></g>
    <g transform="translate(150,90) scale(0.8)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 7 7; 0 0" keyTimes="0;0.5;1" dur="8.4s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.6s" begin="1.1s" repeatCount="indefinite"/></use></g>
    <g transform="translate(900,70) scale(0.8)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -7 6; 0 0" keyTimes="0;0.5;1" dur="9.2s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="5.2s" begin="0.7s" repeatCount="indefinite"/></use></g>
    <g transform="translate(1050,90) scale(0.8)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 7 -6; 0 0" keyTimes="0;0.5;1" dur="8.8s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.8s" begin="1.4s" repeatCount="indefinite"/></use></g>
    <g transform="translate(1080,240) scale(0.8)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -7 -7; 0 0" keyTimes="0;0.5;1" dur="9.4s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="5.0s" begin="0.2s" repeatCount="indefinite"/></use></g>
    <g transform="translate(250,230) scale(0.8)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -6 7; 0 0" keyTimes="0;0.5;1" dur="8.6s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="4.4s" begin="0.8s" repeatCount="indefinite"/></use></g>
    <g transform="translate(120,200) scale(0.8)"><animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 6 -6; 0 0" keyTimes="0;0.5;1" dur="9.6s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <use href="#hx"><animate attributeName="stroke" values="#475569;#f97316;#22d3ee;#475569" dur="5.4s" begin="1.3s" repeatCount="indefinite"/></use></g>
  </g>

  <!-- ORCHESTRATOR HUB -->
  <circle cx="600" cy="160" r="70" fill="url(#hub)">
    <animate attributeName="r" values="60;74;60" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="160" r="30" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.7">
    <animate attributeName="r" values="26;44;26" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <g filter="url(#glow)">
    <polygon points="618,160 609,175.6 591,175.6 582,160 591,144.4 609,144.4" fill="#0d1320" stroke="#f97316" stroke-width="2.5"/>
    <circle cx="600" cy="160" r="6" fill="#f97316"/>
  </g>
</svg>
